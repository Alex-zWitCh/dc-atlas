<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Atlas — Каталог</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  h1 {
    font-size: 24px;
    margin-bottom: 4px;
    color: #58a6ff;
  }
  .subtitle {
    color: #8b949e;
    margin-bottom: 24px;
    font-size: 14px;
  }

  /* Navigation */
  .nav-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #c9d1d9;
    text-decoration: none;
    font-size: 14px;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-link:hover {
    background: #1c2333;
    border-color: #58a6ff;
  }
  .nav-link .count {
    background: #21262d;
    padding: 0 7px;
    border-radius: 10px;
    font-size: 12px;
    color: #8b949e;
  }

  /* Section */
  .section {
    margin-bottom: 32px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px 8px 0 0;
    border-bottom: none;
  }
  .section-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: #f0f6fc;
  }
  .section-header .count {
    background: #21262d;
    padding: 0 9px;
    border-radius: 10px;
    font-size: 12px;
    color: #8b949e;
    line-height: 22px;
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  th {
    background: #1c2333;
    padding: 10px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #30363d;
  }
  td {
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2333; }

  .col-avatar { width: 48px; text-align: center; }
  .col-id { width: 50px; color: #8b949e; font-size: 13px; }
  .col-type { width: 120px; }
  .col-tags { width: 150px; }
  .col-invite { width: 40px; text-align: center; }

  /* Avatar */
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    object-fit: cover; border: 2px solid #30363d;
  }
  .avatar-placeholder {
    width: 40px; height: 40px; border-radius: 50%;
    background: #21262d; display: flex; align-items: center;
    justify-content: center; font-size: 20px; margin: auto;
  }

  /* Badge */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .badge-telegram_mirror { background: #1a3a2a; color: #3fb950; }
  .badge-deltachat_group, .badge-group { background: #1a2a3a; color: #58a6ff; }
  .badge-deltachat_channel, .badge-channel { background: #2a1a3a; color: #bc8cff; }
  .badge-deltachat_bot, .badge-bot { background: #3a2a1a; color: #d29922; }

  /* Tags */
  .tag {
    display: inline-block; padding: 1px 6px; margin: 1px;
    background: #21262d; border-radius: 8px;
    font-size: 11px; color: #8b949e;
  }
  .invite-link { text-decoration: none; font-size: 20px; }
  .source { color: #484f58; }
  small { color: #8b949e; }
  .empty { text-align: center; padding: 60px; color: #484f58; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 DC Atlas — Каталог</h1>
  <p class="subtitle">Всего карточек: {{COUNT}}</p>

  {{NAV}}

  {{SECTIONS}}
</div>
</body>
</html>
